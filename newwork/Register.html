<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="./CSS/Register.css">
</head>
<body>
    <div class="form">
        <div class="general">
            <h1>General Information</h1>
            <div class="form-menu">
                <input type="text" id="title" name="title" placeholder="Title">
            </div>
            <div class Name="form-name">
                <div class="form-menu">
                    <input type="text" id="firstname" name="firstname" placeholder="First Name">
                </div>
                <div class="form-menu">
                    <input type="text" id="lastname" name="lastname" placeholder="Last Name">
                </div>
            </div>
            <div class="form-menu">
                    <input type="text" id="position" name="position" placeholder="Position">
            </div>
            <div class="form-menu">
                    <input type="text" id="company" name="company" placeholder="Company">
            </div>
            <div class="form-business">
                <div class="form-menu">
                    <input type="text" id="businessarena" name="businessarena" placeholder="Business Arena">
                </div>
                <div class="form-menu">
                    <input type="text" id="employees" name="employees" placeholder="Employees">
                </div>
            </div>
        </div>
        <div class="contact">
            <h1>Contact Information</h1>
            <div class="form-menu-contact">
                <input type="text" id="street" name="street" placeholder="Street + Nr">
            </div>
            <div class="form-menu-contact">
                <input type="text" id="additionalinfo" name="additionalinfo" placeholder="Additional Information">
            </div>
            <div class="form-menu-contact">
                <input type="text" id="zipcode" name="zipcode" placeholder="Zip Code">
            </div>
            <div class="form-menu-contact">
                <input type="text" id="place" name="place" placeholder="Place">
            </div>
            <div class="form-menu-contact">
                <input type="text" id="country" name="country" placeholder="Country">
            </div>
            <div class="form-menu-contact">
                <input type="text" id="code" name="code" placeholder="Code +">
            </div>
            <div class="form-menu-contact">
                <input type="text" id="phone" name="phone" placeholder="Phone Number">
            </div>
            <div class="form-menu-contact">
                <input type="email" id="email" name="email" placeholder="your email">
            </div>
            <div class="form-checkbox">
                <input type="checkbox">
                   <label>I do accept the terms and conditions of your site</label>
            </div>
            <div class="form-btn">
                <button>Register Badge</button>
            </div>
            </div>
            
        </div>
    </div>
</body>
</html>
